<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 100" fill="none">
  <!-- "Beauty Power" cursive gold above -->
  <text x="120" y="26" font-family="Georgia, serif" font-style="italic" font-size="17" fill="#C8A96E" text-anchor="middle" letter-spacing="1.5">Beauty Power</text>

  <!-- Thin gold divider -->
  <line x1="52" y1="33" x2="188" y2="33" stroke="#C8A96E" stroke-width="0.5" opacity="0.5"/>

  <!-- "FE" large overlapping letters -->
  <text x="88" y="82" font-family="Georgia, serif" font-style="italic" font-weight="bold" font-size="68" fill="#E8A8A8" opacity="0.95" text-anchor="middle">F</text>
  <text x="152" y="82" font-family="Georgia, serif" font-style="italic" font-weight="bold" font-size="68" fill="#E8A8A8" opacity="0.72" text-anchor="middle">E</text>

  <!-- "CENTRO ESTETICO" small uppercase below -->
